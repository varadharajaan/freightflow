name: CI Pipeline
on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  toolchain-check:
    # Fail fast if Java 21 or Maven Wrapper is missing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }
      - name: Verify Java 21
        run: |
          java -version 2>&1 | grep '"21' || (echo "ERROR: Java 21 required" && exit 1)
      - name: Verify Maven Wrapper
        run: |
          test -f .mvn/wrapper/maven-wrapper.properties || (echo "ERROR: Maven Wrapper missing" && exit 1)

  build-and-test:
    needs: toolchain-check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env: { POSTGRES_DB: freightflow_test, POSTGRES_USER: test, POSTGRES_PASSWORD: test }
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin', cache: 'maven' }
      - name: Compile
        run: ./mvnw compile -B -ntp -T1C
      - name: Unit Tests
        run: ./mvnw test -B -ntp
      - name: Verify (integration tests + quality)
        run: ./mvnw verify -B -ntp
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with: { name: test-reports, path: '**/target/surefire-reports/**' }
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with: { name: coverage, path: '**/target/site/jacoco/**' }

  code-quality:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin', cache: 'maven' }
      - name: Checkstyle
        run: ./mvnw checkstyle:check -B -ntp || true
      - name: SpotBugs
        run: ./mvnw spotbugs:check -B -ntp || true
      - name: Architecture Tests
        run: ./mvnw test -B -ntp -Dtest="*ArchitectureTest" -pl booking-service

  security-scan:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin', cache: 'maven' }
      - name: OWASP Dependency Check
        run: ./mvnw org.owasp:dependency-check-maven:check -B -ntp || true
