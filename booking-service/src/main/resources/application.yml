# =============================================================================
# FreightFlow Booking Service — Main Configuration
# =============================================================================
# This configuration defines the baseline settings for all environments.
# Environment-specific overrides are provided via application-{profile}.yml.
# =============================================================================

spring:
  application:
    name: booking-service

  # ---------------------------------------------------------------------------
  # Virtual Threads (Java 21) — enables lightweight threads for I/O-bound work
  # ---------------------------------------------------------------------------
  threads:
    virtual:
      enabled: true

  # ---------------------------------------------------------------------------
  # PostgreSQL Datasource — credentials injected via environment variables
  # ---------------------------------------------------------------------------
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/freightflow_booking}
    username: ${DB_USERNAME:freightflow}
    password: ${DB_PASSWORD:freightflow}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: booking-pool
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ---------------------------------------------------------------------------
  # JPA / Hibernate
  # ---------------------------------------------------------------------------
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          time_zone: UTC

  # ---------------------------------------------------------------------------
  # Flyway Database Migrations
  # ---------------------------------------------------------------------------
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

# =============================================================================
# Server Configuration
# =============================================================================
server:
  port: 8081
  shutdown: graceful

# =============================================================================
# Actuator — Health, Info, Metrics, Prometheus
# =============================================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: booking-service

# =============================================================================
# Logging — delegates to logback-spring.xml for full configuration
# =============================================================================
logging:
  config: classpath:logback-spring.xml
  level:
    root: INFO
    com.freightflow: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
