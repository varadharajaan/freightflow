# =============================================================================
# FreightFlow Booking Service — Main Configuration
# =============================================================================
# This configuration defines the baseline settings for all environments.
# Environment-specific overrides are provided via application-{profile}.yml.
# =============================================================================

spring:
  application:
    name: booking-service

  # ---------------------------------------------------------------------------
  # Centralized Configuration — import from Config Server
  # ---------------------------------------------------------------------------
  # The 'optional:' prefix allows the service to start even if the Config
  # Server is unavailable, falling back to local configuration.
  # ---------------------------------------------------------------------------
  config:
    import: optional:configserver:http://config:config@${CONFIG_SERVER_HOST:localhost}:8888

  # ---------------------------------------------------------------------------
  # Virtual Threads (Java 21) — enables lightweight threads for I/O-bound work
  # ---------------------------------------------------------------------------
  threads:
    virtual:
      enabled: true

  # ---------------------------------------------------------------------------
  # Security — OAuth2 Resource Server (JWT validation via Keycloak)
  # ---------------------------------------------------------------------------
  # The service validates incoming JWTs by fetching the public keys from
  # Keycloak's JWKS endpoint. The issuer-uri is used to verify the 'iss' claim.
  # ---------------------------------------------------------------------------
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/freightflow}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8180/realms/freightflow/protocol/openid-connect/certs}

  # ---------------------------------------------------------------------------
  # PostgreSQL Datasource — credentials injected via environment variables
  # ---------------------------------------------------------------------------
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/freightflow_booking}
    username: ${DB_USERNAME:freightflow}
    password: ${DB_PASSWORD:freightflow}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: booking-pool
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ---------------------------------------------------------------------------
  # JPA / Hibernate
  # ---------------------------------------------------------------------------
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          time_zone: UTC

  # ---------------------------------------------------------------------------
  # Kafka — Event streaming configuration
  # ---------------------------------------------------------------------------
  # Bootstrap servers are injected via environment variable for flexibility.
  # Producer: acks=all + idempotence for exactly-once delivery.
  # Consumer: manual commit (enable-auto-commit=false) for at-least-once.
  # ---------------------------------------------------------------------------
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      properties:
        enable.idempotence: true
        retries: 3
        retry.backoff.ms: 1000
        linger.ms: 5
        batch.size: 16384
    consumer:
      group-id: booking-service-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        max.poll.records: 100

  # ---------------------------------------------------------------------------
  # Flyway Database Migrations
  # ---------------------------------------------------------------------------
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

# =============================================================================
# Server Configuration
# =============================================================================
server:
  port: 8081
  shutdown: graceful

# =============================================================================
# Actuator — Health, Info, Metrics, Prometheus
# =============================================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: booking-service

# =============================================================================
# Logging — delegates to logback-spring.xml for full configuration
# =============================================================================
logging:
  config: classpath:logback-spring.xml
  level:
    root: INFO
    com.freightflow: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: WARN

# =============================================================================
# FreightFlow Custom Properties
# =============================================================================
freightflow:
  security:
    enabled: true
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}
  saga:
    recovery:
      interval-ms: ${SAGA_RECOVERY_INTERVAL_MS:60000}
      stale-threshold-ms: ${SAGA_RECOVERY_STALE_THRESHOLD_MS:300000}
  kafka:
    partitions: 12
    replication-factor: 1

# =============================================================================
# Eureka Client — Service Registration and Discovery
# =============================================================================
eureka:
  client:
    service-url:
      defaultZone: http://eureka:eureka@${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}
