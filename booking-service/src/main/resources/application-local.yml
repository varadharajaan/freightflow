# =============================================================================
# FreightFlow Booking Service — Local Development Profile
# =============================================================================
# Activate with: --spring.profiles.active=local
# Overrides application.yml for local development with sensible defaults.
# =============================================================================

spring:
  # ---------------------------------------------------------------------------
  # Local PostgreSQL (Docker Compose or native install)
  # ---------------------------------------------------------------------------
  datasource:
    url: jdbc:postgresql://localhost:5432/freightflow_booking
    username: freightflow
    password: freightflow

  # ---------------------------------------------------------------------------
  # JPA — show SQL for debugging during local development
  # ---------------------------------------------------------------------------
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # ---------------------------------------------------------------------------
  # Flyway — allow baseline for fresh local databases
  # ---------------------------------------------------------------------------
  flyway:
    baseline-on-migrate: true

# =============================================================================
# Logging — verbose output for local development
# =============================================================================
logging:
  level:
    com.freightflow: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
