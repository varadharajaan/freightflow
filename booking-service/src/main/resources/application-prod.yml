# ==============================================================================
# FreightFlow Booking Service — PROD Profile
# ==============================================================================
# Production configuration. Strict security, minimal logging, performance-tuned.
# All secrets from AWS Secrets Manager / HashiCorp Vault.
# SQL profiling DISABLED for performance.
# ==============================================================================

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 3000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
      pool-name: freightflow-booking-pool

  jpa:
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        generate_statistics: false
        jdbc:
          batch_size: 25
          fetch_size: 100
        order_inserts: true
        order_updates: true
        query:
          in_clause_parameter_padding: true

  flyway:
    enabled: true
    baseline-on-migrate: false

# --- Profiling (DISABLED in prod for performance) ---
freightflow:
  profiling:
    sql:
      enabled: false

# --- Logging (JSON only, no console) ---
logging:
  level:
    root: WARN
    com.freightflow: INFO
    org.hibernate: WARN
    org.springframework: WARN
    org.apache.kafka: WARN
    io.github.resilience4j: INFO
  config: classpath:logback-spring.xml

# --- Actuator (restricted in prod) ---
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: never
    env:
      enabled: false
    configprops:
      enabled: false

# --- Server hardening ---
server:
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
