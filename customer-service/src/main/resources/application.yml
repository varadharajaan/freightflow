# =============================================================================
# FreightFlow Customer Service — Main Configuration
# =============================================================================
# This configuration defines the baseline settings for all environments.
# Environment-specific overrides are provided via application-{profile}.yml.
# =============================================================================

spring:
  application:
    name: customer-service

  # ---------------------------------------------------------------------------
  # Centralized Configuration — import from Config Server
  # ---------------------------------------------------------------------------
  config:
    import: optional:configserver:http://config:config@${CONFIG_SERVER_HOST:localhost}:8888

  # ---------------------------------------------------------------------------
  # Virtual Threads (Java 21) — enables lightweight threads for I/O-bound work
  # ---------------------------------------------------------------------------
  threads:
    virtual:
      enabled: true

  # ---------------------------------------------------------------------------
  # PostgreSQL Datasource — credentials injected via environment variables
  # ---------------------------------------------------------------------------
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/freightflow_customer}
    username: ${DB_USERNAME:freightflow}
    password: ${DB_PASSWORD:freightflow}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: customer-pool
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ---------------------------------------------------------------------------
  # JPA / Hibernate
  # ---------------------------------------------------------------------------
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          time_zone: UTC

  # ---------------------------------------------------------------------------
  # Kafka — Event streaming configuration
  # ---------------------------------------------------------------------------
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      properties:
        enable.idempotence: true
        retries: 3
        retry.backoff.ms: 1000
        linger.ms: 5
        batch.size: 16384
    consumer:
      group-id: customer-service-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        max.poll.records: 100

  # ---------------------------------------------------------------------------
  # Flyway Database Migrations
  # ---------------------------------------------------------------------------
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  # ---------------------------------------------------------------------------
  # Security — OAuth2 Resource Server
  # ---------------------------------------------------------------------------
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI:http://localhost:8180/realms/freightflow}

# =============================================================================
# Server Configuration
# =============================================================================
server:
  port: 8085
  shutdown: graceful

# =============================================================================
# Actuator — Health, Info, Metrics, Prometheus
# =============================================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: customer-service

# =============================================================================
# Logging — delegates to logback-spring.xml for full configuration
# =============================================================================
logging:
  level:
    root: INFO
    com.freightflow: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: WARN

# =============================================================================
# FreightFlow Custom Properties
# =============================================================================
freightflow:
  kafka:
    partitions: 12
    replication-factor: 1

# =============================================================================
# Eureka Client — Service Registration and Discovery
# =============================================================================
eureka:
  client:
    service-url:
      defaultZone: http://eureka:eureka@${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}
