# =============================================================================
# FreightFlow Vessel Schedule Service — Main Configuration
# =============================================================================

spring:
  application:
    name: vessel-schedule-service

  # ---------------------------------------------------------------------------
  # Centralized Configuration — import from Config Server
  # ---------------------------------------------------------------------------
  config:
    import: optional:configserver:http://config:config@${CONFIG_SERVER_HOST:localhost}:8888

  # ---------------------------------------------------------------------------
  # Virtual Threads (Java 21)
  # ---------------------------------------------------------------------------
  threads:
    virtual:
      enabled: true

  # ---------------------------------------------------------------------------
  # PostgreSQL Datasource
  # ---------------------------------------------------------------------------
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/freightflow_vessel}
    username: ${DB_USERNAME:freightflow}
    password: ${DB_PASSWORD:freightflow}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: vessel-pool
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ---------------------------------------------------------------------------
  # JPA / Hibernate
  # ---------------------------------------------------------------------------
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          time_zone: UTC

  # ---------------------------------------------------------------------------
  # Kafka — Event streaming configuration
  # ---------------------------------------------------------------------------
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      properties:
        enable.idempotence: true
        retries: 3
        retry.backoff.ms: 1000
        linger.ms: 5
        batch.size: 16384
    consumer:
      group-id: vessel-schedule-service-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        max.poll.records: 100

  # ---------------------------------------------------------------------------
  # Flyway Database Migrations
  # ---------------------------------------------------------------------------
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  # ---------------------------------------------------------------------------
  # Cache — Caffeine configuration for schedule lookups
  # ---------------------------------------------------------------------------
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=600s
    cache-names:
      - vessels
      - active-vessels
      - voyages
      - vessel-voyages
      - available-routes

# =============================================================================
# Server Configuration
# =============================================================================
server:
  port: 8084
  shutdown: graceful

# =============================================================================
# Actuator — Health, Info, Metrics, Prometheus
# =============================================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,caches
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: vessel-schedule-service

# =============================================================================
# Logging
# =============================================================================
logging:
  level:
    root: INFO
    com.freightflow: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: WARN

# =============================================================================
# FreightFlow Custom Properties
# =============================================================================
freightflow:
  kafka:
    partitions: 12
    replication-factor: 1
  outbox:
    vessel-topic: ${VESSEL_EVENTS_TOPIC:vessel.events}
    dispatch-interval-ms: ${OUTBOX_DISPATCH_INTERVAL_MS:1000}

# =============================================================================
# Eureka Client — Service Registration and Discovery
# =============================================================================
eureka:
  client:
    service-url:
      defaultZone: http://eureka:eureka@${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}
